input:
  paths:
    - ../data/3.pb
clustering:
  algorithm: beam_neighbor_region_growing
  eps: 0.9
  vehicle_min_points: 8
  sensor_neighbor_rows: 1
  sensor_neighbor_cols: 3
  sensor_min_component_size: 8
tracking:
  algorithm: hungarian_kalman
aggregation:
  algorithm: weighted_voxel_fusion
  frame_selection_method: keyframe_motion
  keyframe_keep: 6
  fusion_weight_mode: quality
  min_track_quality_for_save: 0.2
  aggregate_voxel: 0.05
postprocessing:
  enable_track_quality_scoring: true
