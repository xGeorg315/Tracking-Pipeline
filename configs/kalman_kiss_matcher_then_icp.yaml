input:
  paths:
    - ../data/medium_2 # 115 Vehicles
    # - ../data/medium_energy # 159 Vehicles
tracking:
  algorithm: kalman_nn
  max_dist: 7.5
  max_missed: 2
  min_track_hits: 6
  sticky_extra_dist_per_missed: 1.0
  sticky_max_dist: 12.0
  kf_process_var: 0.8
  kf_meas_var: 1.2
  association_size_weight: 0.05
aggregation:
  algorithm: registration_voxel_fusion
  registration_backend: icp_point_to_plane
  frame_selection_method: keyframe_motion
  keyframe_keep: 8
  enable_registration_underfill_fallback: true
  registration_min_kept_chunks: 2
  registration_max_iter: 30
  registration_max_translation: 3.5
  registration_min_fitness: 0.3
  registration_max_corr_dist: 0.5
  shape_consistency_filter: false
  truncate_after_lane_end_touch: true
  enable_confidence_point_cap: false
  confidence_point_cap_max_points: 2048
  confidence_point_cap_bins: 16
postprocessing:
  enable_trajectory_smoothing: false 
  enable_articulated_vehicle_merge: true
  articulated_gap_eval_window_frames: 5
  articulated_min_overlap_frames: 3
  articulated_min_overlap_ratio: 0.6
  articulated_max_lateral_offset: 0.6
  articulated_max_vertical_offset: 5
  articulated_max_hitch_gap: 1.75
  articulated_max_hitch_gap_std: 0.6
  articulated_max_speed_delta: 0.55
  articulated_min_combined_length: 5.
warumup_runs: 1
measure_runs: 1
